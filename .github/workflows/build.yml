name: Build Plugin

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch, tag, or commit SHA to build'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: gradle

      - name: Build plugin
        run: ./gradlew buildPlugin

      - name: Get plugin filename
        id: get_filename
        run: |
          FILENAME=$(ls build/distributions/easy-yapi-*.zip | xargs basename)
          echo "plugin_filename=${FILENAME}" >> $GITHUB_OUTPUT

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.get_filename.outputs.plugin_filename }}
          path: build/distributions/easy-yapi-*.zip
          retention-days: 7
          if-no-files-found: error
